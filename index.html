<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم الشاملة للهاتف</title>
    <link rel="stylesheet" href="main.css">
</head>
<body>
    
    <div id="status-bar">جاهز لتنفيذ الأوامر...</div>

    <div class="grid">
        <div class="card" onclick="toggleFlash()">🔦<br>الكشاف</div>
        <div class="card" onclick="vibrateDevice()">📳<br>اهتزاز</div>
        <div class="card" onclick="getGPS()">📍<br>الموقع GPS</div>
        <div class="card" onclick="sendNotification()">🔔<br>إشعار</div>
        <div class="card" onclick="shareContent()">📤<br>مشاركة</div>
        <div class="card" onclick="toggleFullScreen()">🖥️<br>ملء الشاشة</div>
        <div class="card" onclick="checkBattery()">🔋<br>البطارية</div>
        <div class="card" onclick="startOrientation()">🔄<br>الحساسات</div>
        <div class="card" onclick="openCamera()">📷<br>الكاميرا</div>
        <div class="card" onclick="keepScreenOn()">💡<br>منع القفل</div>
        <div class="card" onclick="testMicrophone()">🎤<br>الميكروفون</div>
        <div class="card" onclick="testGyroscope()">🔄<br>الجيروسكوب</div>
        <div class="card" onclick="connectBluetooth()">🔵<br>البلوتوث</div>
        <div class="card" onclick="keepScreenOn()">🔆<br>ضوء الشاشة</div>
        <div class="card" onclick="checkNetwork()">📶<br>حالة الشبكة</div>
        <div class="card" onclick="nativeShare()">🔗<br>المشاركة</div>
        <div class="card" onclick="testLightSensor()">💡<br>مستشعر الضوء</div>
        <div class="card" onclick="startSpeech()">🗣️<br>التعرف على الكلام</div>
        <div class="card" onclick="lockOrientation()">🔒<br>قفل الاتجاه</div>
    </div>

    <script src="main.js"></script>
</body>
</html>
